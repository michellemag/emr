services:
  - type: web
    name: emr-api
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run install-all && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-db
          property: connectionString

databases:
  - name: emr-db
    databaseName: emr_db
    user: emr_user
    plan: free
